<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bunker | Web Dinámica</title>
    <style>
        :root { --verde: #0b291b; --neon: #1abc9c; --sol: #f1c40f; --coral: #e74c3c; --blanco: #ffffff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
        body { background:#f5fcf6; color:#2c3e50; padding-top:80px; }
        #menu-esquina { position:fixed; top:90px; right:20px; z-index:1500; background:rgba(11,41,27,0.95); padding:15px; border-radius:20px; border:2px solid var(--neon); display:flex; flex-direction:column; gap:8px; }
        .btn-filtro { background:transparent; border:1px solid var(--neon); color:white; padding:8px 15px; border-radius:30px; cursor:pointer; font-size:13px; font-weight:bold; }
        .btn-filtro:hover, .btn-filtro.activo { background:var(--neon); color:var(--verde); }
        header { background:var(--verde); position:fixed; top:0; width:100%; z-index:1000; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
        nav { display:flex; justify-content:space-between; align-items:center; max-width:1200px; margin:0 auto; padding:15px 20px; }
        .logo { color:var(--blanco); font-size:24px; font-weight:800; text-transform:uppercase; }
        .logo span { color:var(--neon); }
        .contenedor-principal { max-width:1100px; margin:30px auto; padding:0 20px; }
        .visor-plantilla { background:white; border-radius:30px; overflow:hidden; box-shadow:0 15px 35px rgba(0,0,0,0.06); display:grid; grid-template-columns:1fr 1fr; min-height:480px; }
        .plantilla-img { background-size:cover; background-position:center; min-height:300px; }
        .plantilla-info { padding:40px; display:flex; flex-direction:column; justify-content:center; }
        .plantilla-info h2 { font-size:36px; color:var(--verde); margin-bottom:15px; text-transform:uppercase; }
        .plantilla-info p { font-size:17px; color:#57606f; margin-bottom:25px; }
        .seccion-resenas { max-width:800px; margin:50px auto; padding:0 20px; }
        .formulario-opiniones { background:white; padding:30px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.05); margin-bottom:40px; }
        .form-grupo { margin-bottom:15px; display:flex; flex-direction:column; }
        .form-grupo label { font-weight:bold; margin-bottom:5px; }
        .form-grupo input, .form-grupo textarea, .form-grupo select { width:100%; padding:12px; border:2px solid #e2e8f0; border-radius:10px; font-size:16px; outline:none; }
        .lista-resenas { display:flex; flex-direction:column; gap:20px; }
        .resena-card { background:white; padding:25px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.02); border-left:5px solid var(--neon); }
        .resena-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-weight:bold; }
        .mapa-contenedor { max-width:1100px; margin:40px auto; padding:0 20px; }
        .mapa-box { width:100%; height:380px; border-radius:25px; overflow:hidden; box-shadow:0 10px 30px rgba(11,41,27,0.15); border:4px solid var(--verde); }
        #creator-panel { background:#1e272e; color:white; padding:30px; border-radius:25px; max-width:1100px; margin:40px auto; display:none; }
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
        .form-control { display:flex; flex-direction:column; }
        .form-control label { font-size:13px; color:#a4b0be; margin-bottom:5px; }
        .form-control input, .form-control select, .form-control textarea { padding:12px; border-radius:8px; border:none; background:#2f3542; color:white; }
        .btn-action { display:inline-block; background-color:var(--coral); color:white; padding:12px 30px; text-decoration:none; border-radius:50px; font-weight:bold; text-align:center; cursor:pointer; border:none; }
        footer { background:#05140d; color:#799487; text-align:center; padding:40px 20px; margin-top:60px; }
        @media (max-width:768px) { .visor-plantilla { grid-template-columns:1fr; } #menu-esquina { top:auto; bottom:20px; right:20px; left:20px; flex-direction:row; overflow-x:auto; } }
    </style>
</head>
<body>
    <div id="menu-esquina">
        <button class="btn-filtro activo" onclick="mostrarArea('hospedaje',this)">⛺ Hospedaje</button>
        <button class="btn-filtro" onclick="mostrarArea('restaurante',this)">🍳 Restaurante</button>
        <button class="btn-filtro" onclick="mostrarArea('senderismo',this)">🥾 Senderismo</button>
        <button class="btn-filtro" onclick="mostrarArea('aves',this)">🦜 Aves</button>
        <button class="btn-filtro" onclick="mostrarArea('insectos',this)">🦋 Insectos</button>
    </div>
    <header><nav><div class="logo">The <span>Bunker</span></div><div id="google_translate_element"></div></nav></header>
    <main class="contenedor-principal"><div class="visor-plantilla" id="visor-contenido"></div></main>
    <section class="seccion-resenas">
        <h2 style="text-align:center; margin-bottom:30px; color:var(--verde); text-transform:uppercase;">💬 Opiniones del Paraíso</h2>
        <div class="formulario-opiniones">
            <form id="opinionForm" onsubmit="agregarResenaNueva(event)">
                <div class="form-grupo"><label>Nombre / Familia:</label><input type="text" id="form-nombre" required placeholder="Ej: John (Alemania)"></div>
                <div class="form-grupo"><label>Calificación:</label><select id="form-estrellas"><option value="⭐⭐⭐⭐借">⭐⭐⭐⭐⭐</option><option value="⭐⭐⭐⭐">⭐⭐⭐⭐</option></select></div>
                <div class="form-grupo"><label>Tu Experiencia:</label><textarea id="form-comentario" rows="3" required placeholder="Cuéntanos qué tal el río..."></textarea></div>
                <button type="submit" class="btn-action" style="background:var(--verde);">Publicar Comentario</button>
            </form>
        </div>
        <div class="lista-resenas" id="contenedor-resenas"></div>
    </section>
    <div class="mapa-contenedor">
        <div class="mapa-box"><iframe src="https://google.com" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe></div>
    </div>
    <section id="creator-panel">
        <form onsubmit="crearNuevaPlantilla(event)">
            <div class="form-grid">
                <div class="form-control"><label>Área:</label><select id="nueva-area"><option value="hospedaje">⛺ Hospedaje</option><option value="restaurante">🍳 Restaurante</option><option value="senderismo">🥾 Senderismo</option><option value="aves">🦜 Aves</option><option value="insectos">🦋 Insectos</option></select></div>
                <div class="form-control"><label>Título:</label><input type="text" id="nuevo-titulo" required></div>
                <div class="form-control" style="grid-column: span 2;"><label>Descripción:</label><textarea id="nueva-descripcion" rows="3" required></textarea></div>
                <div class="form-control" style="grid-column: span 2;"><label>Foto:</label><input type="text" id="nueva-foto" required></div>
            </div>
            <button type="submit" class="btn-action" style="background:#2ecc71;">➕ Insertar Plantilla</button>
        </form>
    </section>
    <footer><p>&copy; 2026 The Bunker (Bürí)</p><button class="btn-filtro" style="margin:15px auto 0; border-color:#799487; color:#799487;" onclick="desbloquearCreador()">🔐 Acceso Propietario</button></footer>
    <script>function googleTranslateElementInit(){new google.translate.TranslateElement({pageLanguage:'es',includedLanguages:'en,de,fr,it,pt,es,nl',layout:google.translate.TranslateElement.InlineLayout.SIMPLE},'google_translate_element');}</script>
    <script src="//://google.com"></script>
    <script>
        const plantillasPredeterminadas = {
            hospedaje: { titulo: "Hospedaje entre Flores", desc: "Cabañas rústicas y áreas de Car Camping rodeadas de heliconias, orquídeas y el sonido del río.", foto: "hospedaje.jpg" },
            restaurante: { titulo: "Cocina de la Huerta", desc: "Comida típica y orgánica preparada con ingredientes frescos del sector de Bürí.", foto: "restaurante.jpg" },
            senderismo: { titulo: "Senderos en el Bosque", desc: "Camina bajo árboles nativos gigantes y respira el aire más puro de la montaña.", foto: "bosque.jpg" },
            aves: { titulo: "Avistamiento de Aves", desc: "Divisa tucanes, colibríes y fauna exótica directamente desde nuestro búnker ecológico.", foto: "aves.jpg" },
            insectos: { titulo: "Mariposas e Insectos", desc: "Un santuario lleno de mariposas multicolores y polinizadores atraídos por la flora.", foto: "mariposa.jpg" }
        };
        if(!localStorage.getItem('bunker_plantillas'))localStorage.setItem('bunker_plantillas',JSON.stringify(plantillasPredeterminadas));
        function mostrarArea(areaKey,botonSelector=null){
            if(botonSelector){document.querySelectorAll('.btn-filtro').forEach(btn=>btn.classList.remove('activo'));botonSelector.classList.add('activo');}
            const baseDatos=JSON.parse(localStorage.getItem('bunker_plantillas'));const datosArea=baseDatos[areaKey];
            document.getElementById('visor-contenido').innerHTML=`<div class="plantilla-img" style="background-image:url('${datosArea.foto}')"></div><div class="plantilla-info"><h2>${datosArea.titulo}</h2><p>${datosArea.desc}</p><a href="https://wa.me" target="_blank" class="btn-action" style="background:#25d366;">💬 WhatsApp</a></div>`;
        }
unction desbloquearCreador(){if(prompt("Contraseña:")==="bunker123"){document.getElementById('creator-panel').style.display="block";window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});}else{alert("Incorrecta.");}}function crearNuevaPlantilla(event){event.preventDefault();const area=document.getElementById('nueva-area').value,titulo=document.getElementById('nuevo-titulo').value,desc=document.getElementById('nueva-descripcion').value,foto=document.getElementById('nueva-foto').value;let baseDatos=JSON.parse(localStorage.getItem('bunker_plantillas'));baseDatos[area]={titulo,desc,foto};localStorage.setItem('bunker_plantillas',JSON.stringify(baseDatos));mostrarArea(area);alert("✨ ¡Actualizado!");}function agregarResenaNueva(event){event.preventDefault();const nombre=document.getElementById('form-nombre').value,estrellas=document.getElementById('form-estrellas').value,comentario=document.getElementById('form-comentario').value;let resenas=JSON.parse(localStorage.getItem('bunker_resenas'))||[];resenas.unshift({nombre,estrellas,comentario});localStorage.setItem('bunker_resenas',JSON.stringify(resenas));cargarResenas();document.getElementById('opinionForm').reset();}function cargarResenas(){const contenedor=document.getElementById('contenedor-resenas');let resenas=JSON.parse(localStorage.getItem('bunker_resenas'))||[];let html=<div class="resena-card"><div class="resena-header"><span>Familia Miller</span><span>⭐⭐⭐⭐⭐</span></div><p>"Excelente car camping y río limpio."</p></div>;resenas.forEach(r=>{html+=<div class="resena-card"><div class="resena-header"><span>${r.nombre}</span><span>⭐⭐⭐⭐⭐</span></div><p>"${r.comentario}"</p></div>;});contenedor.innerHTML=html;}document.addEventListener("DOMContentLoaded",()=>{mostrarArea('hospedaje');cargarResenas();});
